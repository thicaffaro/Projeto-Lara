name: flow_health_metrics
description: >
  Cron horário. Agrega métricas da última hora e salva em ops_metrics_hourly:
  messages_inbound, messages_responded, response_rate, latency_p50/p95,
  dlq_pending, active_handovers.
  Endpoint: /api/n8n/health-metrics

nodes:
  - id: cron
    name: Cron horário
    type: n8n-nodes-base.scheduleTrigger
    typeVersion: 1.2
    position: [240, 300]
    parameters:
      rule:
        interval:
          - field: hours
            hoursInterval: 1
  - id: metrics
    name: Coletar métricas
    type: n8n-nodes-base.httpRequest
    typeVersion: 4.1
    position: [460, 300]
    parameters:
      method: POST
      url: "={{ $env['NEXT_PUBLIC_APP_URL'] }}/api/n8n/health-metrics"
      sendHeaders: true
      headers:
        values:
          - name: Authorization
            value: "=Bearer {{ $env['N8N_WEBHOOK_SECRET'] }}"
      options:
        timeout: 30000
        retryOnFail: false

connections:
  Cron horário:
    main:
      - - node: Coletar métricas
          type: main
          index: 0

settings:
  executionOrder: v1
tags: [lara-health, cron, ops]
