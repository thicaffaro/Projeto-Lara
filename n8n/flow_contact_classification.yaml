name: flow_contact_classification
description: >
  Cron diário às 3h. Promove contacts unknown→client para contatos
  com appointment nos últimos 7 dias.
  Endpoint: /api/n8n/contact-classification

nodes:
  - id: cron
    name: Cron diário 3h
    type: n8n-nodes-base.scheduleTrigger
    typeVersion: 1.2
    position: [240, 300]
    parameters:
      rule:
        interval:
          - field: cronExpression
            expression: "0 3 * * *"
  - id: classify
    name: Classificar contatos
    type: n8n-nodes-base.httpRequest
    typeVersion: 4.1
    position: [460, 300]
    parameters:
      method: POST
      url: "={{ $env['NEXT_PUBLIC_APP_URL'] }}/api/n8n/contact-classification"
      sendHeaders: true
      headers:
        values:
          - name: Authorization
            value: "=Bearer {{ $env['N8N_WEBHOOK_SECRET'] }}"
      options:
        timeout: 30000
        retryOnFail: true
        maxTries: 2

connections:
  Cron diário 3h:
    main:
      - - node: Classificar contatos
          type: main
          index: 0

settings:
  executionOrder: v1
tags: [lara-classification, cron]
