name: flow_audit_log_archive
description: >
  Cron mensal (dia 1 às 3h). Identifica partições de audit_log candidatas
  a archive (> 6 meses) e registra em ops_metrics_hourly.
  MVP: apenas loga — não faz DETACH automático.
  Endpoint: /api/n8n/audit-archive

nodes:
  - id: cron
    name: Cron mensal dia 1 3h
    type: n8n-nodes-base.scheduleTrigger
    typeVersion: 1.2
    position: [240, 300]
    parameters:
      rule:
        interval:
          - field: cronExpression
            expression: "0 3 1 * *"
  - id: archive
    name: Verificar archive
    type: n8n-nodes-base.httpRequest
    typeVersion: 4.1
    position: [460, 300]
    parameters:
      method: POST
      url: "={{ $env['NEXT_PUBLIC_APP_URL'] }}/api/n8n/audit-archive"
      sendHeaders: true
      headers:
        values:
          - name: Authorization
            value: "=Bearer {{ $env['N8N_WEBHOOK_SECRET'] }}"
      options:
        timeout: 30000
        retryOnFail: false

connections:
  Cron mensal dia 1 3h:
    main:
      - - node: Verificar archive
          type: main
          index: 0

settings:
  executionOrder: v1
tags: [lara-archive, cron, maintenance]
